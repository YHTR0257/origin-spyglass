services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: llm-agent-backend
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    environment:
      APP_NAME: ${APP_NAME:-llm-agent-boilerplate}
      ENVIRONMENT: ${ENVIRONMENT:-docker}
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--app-dir",
        "src",
        "--host",
        "0.0.0.0",
        "--port",
        "${BACKEND_PORT:-8000}",
      ]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: llm-agent-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      OPENAI_API_BASE_URL: http://backend:${BACKEND_PORT:-8000}/v1
    depends_on:
      - backend
    restart: unless-stopped
